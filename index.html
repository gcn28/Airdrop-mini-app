        // ==================== STATE ====================
        const ADMIN_PASSWORD = '5131626696';

        function generateId() {
            return Math.floor(1000000000 + Math.random() * 9000000000).toString();
        }

        const state = {
            lang: 'tr',
            userId: null,
            username: null,
            balance: 0,
            predictions: [],
            users: [],
            pendingDeposits: [],
            pendingWithdrawals: [],
            currentPage: 'markets',
            modalCallback: null,
            isAdmin: false,
            isLoggedIn: false,
            sessionId: null,
            bets: []
        };

        // ==================== DB - KALICI VERİ ====================
        function loadDB() {
            try {
                const data = localStorage.getItem('yesno_db');
                if (data) {
                    const d = JSON.parse(data);
                    state.predictions = d.predictions || [];
                    state.users = d.users || [];
                    state.pendingDeposits = d.pendingDeposits || [];
                    state.pendingWithdrawals = d.pendingWithdrawals || [];
                    state.bets = d.bets || [];
                    
                    const session = localStorage.getItem('yesno_session');
                    if (session) {
                        const s = JSON.parse(session);
                        const user = state.users.find(u => u.id === s.userId);
                        if (user) {
                            state.userId = user.id;
                            state.username = user.username;
                            state.balance = user.balance || 0;
                            state.isLoggedIn = true;
                        }
                    }
                } else {
                    // İlk kurulum
                    const demoUsers = [
                        { id: generateId(), username: 'admin', password: ADMIN_PASSWORD, balance: 0, totalBets: 0, totalWon: 0, totalLost: 0, joined: new Date().toISOString() }
                    ];
                    state.users = demoUsers;
                    
                    const demos = [
                        'Bitcoin 100.000$ üzerinde kapanacak mı?',
                        'Ethereum 10.000$ olacak mı?',
                        'TON 10$ görecek mi?',
                        'Solana 500$ aşacak mı?'
                    ];
                    demos.forEach(q => {
                        state.predictions.push({
                            id: Date.now() + Math.random() * 1000,
                            question: q,
                            yes: Math.floor(Math.random() * 200 + 50),
                            no: Math.floor(Math.random() * 200 + 50),
                            status: 'active',
                            createdAt: new Date().toISOString()
                        });
                    });
                    state.bets = [];
                    saveDB();
                }
            } catch(e) {
                console.log('DB load error', e);
            }
        }

        function saveDB() {
            try {
                localStorage.setItem('yesno_db', JSON.stringify({
                    predictions: state.predictions,
                    users: state.users,
                    pendingDeposits: state.pendingDeposits,
                    pendingWithdrawals: state.pendingWithdrawals,
                    bets: state.bets
                }));
            } catch(e) {
                console.log('DB save error', e);
            }
        }

        function saveSession() {
            if (state.isLoggedIn) {
                localStorage.setItem('yesno_session', JSON.stringify({
                    userId: state.userId,
                    username: state.username
                }));
            } else {
                localStorage.removeItem('yesno_session');
            }
        }

        function clearAllData() {
            if (confirm('Tüm veriler silinecek. Emin misiniz?')) {
                localStorage.removeItem('yesno_db');
                localStorage.removeItem('yesno_session');
                location.reload();
            }
        }

        function updateUserBalance(amount) {
            state.balance += amount;
            const user = state.users.find(u => u.id === state.userId);
            if (user) {
                user.balance = state.balance;
                saveDB();
            }
        }

        function getUserById(id) {
            return state.users.find(u => u.id === id);
        }

        function getUserByUsername(username) {
            return state.users.find(u => u.username.toLowerCase() === username.toLowerCase());
        }

        // ==================== INIT ====================
        loadDB();

        // ==================== UTILS ====================
        function t(key) {
            return T[state.lang][key] || key;
        }

        function setLang(lang) {
            state.lang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            renderPage();
        }

        function showToast(msg, type = 'success') {
            const tEl = document.getElementById('toast');
            tEl.textContent = msg;
            tEl.className = 'toast show ' + type;
            clearTimeout(tEl._timeout);
            tEl._timeout = setTimeout(() => tEl.classList.remove('show'), 3000);
        }

        function openModal(title, body, confirmText = null, onConfirm = null) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalConfirm').textContent = confirmText || t('confirm');
            document.getElementById('modal').classList.add('active');
            state.modalCallback = onConfirm;
            document.getElementById('modalConfirm').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            state.modalCallback = null;
        }

        function modalConfirm() {
            if (state.modalCallback) state.modalCallback();
            closeModal();
        }

        // ==================== LOGIN ====================
        function showLogin() {
            document.getElementById('modalTitle').textContent = '📊 YESNO';
            document.getElementById('modalBody').innerHTML = `
                <div class="login-box">
                    <div class="login-sub">${t('login')} / ${t('register')}</div>
                    <div class="lang-selector" style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">
                        <button class="lang-btn ${state.lang === 'tr' ? 'active' : ''}" onclick="setLang('tr')">🇹🇷 TR</button>
                        <button class="lang-btn ${state.lang === 'ru' ? 'active' : ''}" onclick="setLang('ru')">🇷🇺 RU</button>
                        <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" onclick="setLang('en')">🇬🇧 EN</button>
                    </div>
                    <input class="modal-input" id="loginUsername" type="text" placeholder="${t('username')}">
                    <input class="modal-input" id="loginPassword" type="password" placeholder="${t('password')}">
                    <div class="login-error" id="loginError"></div>
                    <button class="modal-btn" onclick="doLogin()">${t('login')}</button>
                    <button class="modal-btn secondary" onclick="doRegister()">${t('register')}</button>
                    <div class="login-divider"><span>${t('guest')}</span></div>
                    <button class="modal-btn secondary" onclick="guestLogin()">👤 ${t('guest')}</button>
                </div>
            `;
            document.getElementById('modalConfirm').style.display = 'none';
            document.querySelector('.modal .secondary:last-child')?.remove();
            document.getElementById('modal').classList.add('active');
        }

        function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const error = document.getElementById('loginError');

            if (!username) { error.textContent = t('enterUsername'); error.style.display = 'block'; return; }
            if (!password) { error.textContent = t('enterPassword'); error.style.display = 'block'; return; }

            const user = getUserByUsername(username);
            if (!user) { error.textContent = t('userNotFound'); error.style.display = 'block'; return; }
            if (user.password !== password) { error.textContent = t('wrongPassword'); error.style.display = 'block'; return; }

            error.style.display = 'none';
            state.userId = user.id;
            state.username = user.username;
            state.balance = user.balance || 0;
            state.isLoggedIn = true;
            saveSession();
            closeModal();
            showToast('✅ ' + t('loginSuccess'), 'success');
            renderPage();
        }

        function doRegister() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const error = document.getElementById('loginError');

            if (!username) { error.textContent = t('enterUsername'); error.style.display = 'block'; return; }
            if (!password) { error.textContent = t('enterPassword'); error.style.display = 'block'; return; }
            if (username.length < 3) { error.textContent = 'En az 3 karakter!'; error.style.display = 'block'; return; }
            if (password.length < 4) { error.textContent = 'En az 4 karakter!'; error.style.display = 'block'; return; }

            if (getUserByUsername(username)) {
                error.textContent = t('userExists');
                error.style.display = 'block';
                return;
            }

            const newUser = {
                id: generateId(),
                username: username,
                password: password,
                balance: 0,
                totalBets: 0,
                totalWon: 0,
                totalLost: 0,
                joined: new Date().toISOString()
            };

            state.users.push(newUser);
            saveDB();

            state.userId = newUser.id;
            state.username = newUser.username;
            state.balance = 0;
            state.isLoggedIn = true;
            saveSession();
            closeModal();
            showToast('✅ ' + t('registerSuccess'), 'success');
            renderPage();
        }

        function logout() {
            state.isLoggedIn = false;

        // ==================== RENDER ====================
        function renderPage() {
            if (!state.isLoggedIn) {
                showLogin();
                document.getElementById('mainContent').innerHTML = '';
                document.getElementById('balanceDisplay').textContent = '0.00';
                document.getElementById('userNameDisplay').textContent = 'Misafir';
                document.getElementById('userIdTooltip').textContent = 'ID: ---';
                return;
            }

            const page = state.currentPage;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
            document.getElementById('navMarkets').textContent = t('markets');
            document.getElementById('navWallet').textContent = t('wallet');
            document.getElementById('navAdmin').textContent = t('admin');
            document.getElementById('navSupport').textContent = t('support');
            document.getElementById('balanceDisplay').textContent = state.balance.toFixed(2);
            document.getElementById('userNameDisplay').textContent = state.username || 'Misafir';
            document.getElementById('userIdTooltip').textContent = 'ID: ' + (state.userId || '---');

            if (page === 'markets') renderMarkets();
            else if (page === 'wallet') renderWallet();
            else if (page === 'admin') renderAdmin();
            else if (page === 'support') renderSupport();
        }

        function showPage(page) {
            state.currentPage = page;
            renderPage();
        }

        // ==================== MARKETS ====================
        function renderMarkets() {
            const container = document.getElementById('mainContent');
            const preds = state.predictions.filter(p => p.status === 'active');

            if (preds.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:60px 20px;color:#555577;">
                        <div style="font-size:48px;margin-bottom:16px;">📊</div>
                        <div>${t('noMarkets')}</div>
                    </div>
                `;
                return;
            }

            let html = '';
            preds.forEach((p, i) => {
                const total = p.yes + p.no || 1;
                const yesP = ((p.yes / total) * 100).toFixed(1);
                const noP = ((p.no / total) * 100).toFixed(1);

                html += `
                    <div class="market-card">
                        <div class="market-header">
                            <div class="market-title">${p.question}</div>
                            <span class="market-status active">● ${t('active')}</span>
                        </div>
                        <div class="market-pools">
                            <div class="pool-bar yes" onclick="openBetModal(${i}, 'yes')">
                                <div class="pool-label">✅ ${t('yes')}</div>
                                <div class="pool-amount">${p.yes.toFixed(1)} TON</div>
                                <div class="pool-percent">${yesP}%</div>
                            </div>
                            <div class="pool-bar no" onclick="openBetModal(${i}, 'no')">
                                <div class="pool-label">❌ ${t('no')}</div>
                                <div class="pool-amount">${p.no.toFixed(1)} TON</div>
                                <div class="pool-percent">${noP}%</div>
                            </div>
                        </div>
                        <button class="bet-btn" onclick="openBetModal(${i}, null)">💰 Bahis Yap</button>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function openBetModal(index, preChoice) {
            const preds = state.predictions.filter(p => p.status === 'active');
            const p = preds[index];
            if (!p) return;

            const choiceHtml = preChoice ? 
                `<div style="text-align:center;padding:8px;background:#0a0a0f;border-radius:10px;margin-bottom:12px;border:1px solid ${preChoice === 'yes' ? '#00d4ff' : '#ff6b6b'};">
                    <b style="color:${preChoice === 'yes' ? '#00d4ff' : '#ff6b6b'};">${preChoice === 'yes' ? '✅ EVET' : '❌ HAYIR'}</b> seçildi
                </div>` :
                `<div style="display:flex;gap:10px;margin-bottom:12px;">
                    <button class="modal-btn" style="flex:1;padding:10px;background:#00d4ff;color:#0a0a0a;" onclick="setBetChoice('yes', ${index})">✅ ${t('yes')}</button>
                    <button class="modal-btn" style="flex:1;padding:10px;background:#ff6b6b;color:#ffffff;" onclick="setBetChoice('no', ${index})">❌ ${t('no')}</button>
                </div>`;

            openModal(
                '💰 Bahis Yap',
                `
                    <div style="margin-bottom:12px;font-size:14px;color:#8888aa;">${p.question}</div>
                    <div style="display:flex;gap:10px;margin-bottom:12px;">
                        <div style="flex:1;background:#0a0a0f;border-radius:10px;padding:8px;text-align:center;border:1px solid #1a1a2e;">
                            <div style="font-size:11px;color:#8888aa;">✅ ${t('yes')}</div>
                            <div style="font-size:14px;font-weight:600;color:#00d4ff;">${p.yes.toFixed(1)} TON</div>
                        </div>
                        <div style="flex:1;background:#0a0a0f;border-radius:10px;padding:8px;text-align:center;border:1px solid #1a1a2e;">
                            <div style="font-size:11px;color:#8888aa;">❌ ${t('no')}</div>
                            <div style="font-size:14px;font-weight:600;color:#ff6b6b;">${p.no.toFixed(1)} TON</div>
                        </div>
                    </div>
                    ${choiceHtml}
                    <input class="modal-input" id="betAmount" type="number" placeholder="${t('enterAmount')}" step="0.1" min="0.1">
                    <div style="font-size:12px;color:#555577;margin-bottom:8px;">${t('balance')}: ${state.balance.toFixed(2)} TON</div>
                    <input type="hidden" id="_betIndex" value="${index}">
                    ${preChoice ? `<input type="hidden" id="_betChoice" value="${preChoice}">` : ''}
                `,
                t('confirm'),
                () => {
                    const amount = parseFloat(document.getElementById('betAmount').value);
                    const idx = parseInt(document.getElementById('_betIndex').value);
                    const choice = document.getElementById('_betChoice') ? document.getElementById('_betChoice').value : null;
                    
                    if (!choice) { showToast('Seçim yapın!', 'error'); return; }
                    if (!amount || amount <= 0) { showToast(t('enterAmount'), 'error'); return; }
                    if (amount > state.balance) { showToast(t('insufficient'), 'error'); return; }

                    const preds2 = state.predictions.filter(p => p.status === 'active');
                    const p2 = preds2[idx];
                    if (!p2) return;

                    state.bets.push({
                        userId: state.userId,
                        username: state.username,
                        predictionId: p2.id,
                        choice: choice,
                        amount: amount,
                        status: 'active',
                        wonAmount: 0,
                        placedAt: new Date().toISOString()
                    });

                    updateUserBalance(-amount);
                    if (choice === 'yes') p2.yes += amount;
                    else p2.no += amount;

                    const user = state.users.find(u => u.id === state.userId);
                    if (user) user.totalBets = (user.totalBets || 0) + 1;

                    saveDB();
                    showToast('✅ ' + t('betPlaced'), 'success');
                    renderPage();
                }
            );

            if (preChoice) {
                document.getElementById('_betChoice')?.remove();
                const el = document.createElement('input');
                el.id = '_betChoice';
                el.type = 'hidden';
                el.value = preChoice;
                document.getElementById('modalBody').appendChild(el);
            }
        }

        function setBetChoice(choice, index) {
            document.getElementById('_betChoice')?.remove();
            const el = document.createElement('input');
            el.id = '_betChoice';
            el.type = 'hidden';
            el.value = choice;
            document.getElementById('modalBody').appendChild(el);
            showToast('✅ ' + (choice === 'yes' ? t('yes') : t('no')) + ' seçildi', 'success');
        }

        // ==================== WALLET ====================
        function renderWallet() {
            const container = document.getElementById('mainContent');
            const user = state.users.find(u => u.id === state.userId);
            
            const userBets = state.bets.filter(b => b.userId === state.userId);
            let historyHtml = '';
            if (userBets.length > 0) {
                historyHtml = userBets.slice(-10).reverse().map(b => {

        // ==================== DAĞITIM SİSTEMİ ====================
        function distributeWinnings(predictionId, result) {
            const pred = state.predictions.find(p => p.id === predictionId);
            if (!pred) return { success: false, error: 'Tahmin bulunamadı' };
            
            const winningBets = state.bets.filter(b => 
                b.predictionId === predictionId && 
                b.choice === result && 
                b.status === 'active'
            );
            
            if (winningBets.length === 0) {
                pred.status = 'resolved';
                pred.result = result;
                pred.resolvedAt = new Date().toISOString();
                saveDB();
                return { 
                    success: true, 
                    winners: 0, 
                    prizePool: 0, 
                    commission: 0,
                    totalWinningAmount: 0
                };
            }
            
            const totalWinningAmount = winningBets.reduce((sum, b) => sum + b.amount, 0);
            const totalPool = pred.yes + pred.no;
            const losingPool = result === 'yes' ? pred.no : pred.yes;
            const commission = losingPool * 0.25;
            const prizePool = totalPool - commission;
            
            winningBets.forEach(bet => {
                const share = bet.amount / totalWinningAmount;
                const winAmount = prizePool * share;
                
                const user = state.users.find(u => u.id === bet.userId);
                if (user) {
                    user.balance = (user.balance || 0) + winAmount;
                    user.totalWon = (user.totalWon || 0) + winAmount;
                    if (user.id === state.userId) {
                        state.balance = user.balance;
                    }
                }
                
                bet.status = 'won';
                bet.wonAmount = winAmount;
            });
            
            const losingBets = state.bets.filter(b => 
                b.predictionId === predictionId && 
                b.choice !== result && 
                b.status === 'active'
            );
            losingBets.forEach(bet => {
                bet.status = 'lost';
                const user = state.users.find(u => u.id === bet.userId);
                if (user) {
                    user.totalLost = (user.totalLost || 0) + bet.amount;
                }
            });
            
            pred.status = 'resolved';
            pred.result = result;
            pred.resolvedAt = new Date().toISOString();
            pred.commission = commission;
            
            const admin = state.users.find(u => u.username === 'admin');
            if (admin) {
                admin.balance = (admin.balance || 0) + commission;
            }
            
            saveDB();
            
            return {
                success: true,
                winners: winningBets.length,
                prizePool: prizePool,
                commission: commission,
                totalWinningAmount: totalWinningAmount,
                winningBets: winningBets.map(b => ({
                    userId: b.userId,
                    username: b.username,
                    amount: b.amount,
                    winAmount: (b.amount / totalWinningAmount) * prizePool
                }))
            };
        }

            const distribution = distributeWinnings(p.id, result);
            
            if (!distribution.success) {
                showToast('❌ Dağıtım başarısız!', 'error');
                return;

            let message = '✅ <b>Tahmin Sonuçlandı!</b>\n\n';

                    message += '  • ' + (w.username || w.userId) + ': +' + w.winAmount.toFixed(2) + ' TON\n';

            showToast('✅ Tahmin sonuçlandı ve dağıtım yapıldı!', 'success');
            closeModal();
            
            openModal('📊 Sonuç', message, t('cancel'), () => {});

                });
            }

            html += '</div><button class="bet-btn" onclick="renderPage()" style="background:#2a2a4a;">🔙 Geri</button>';
            container.innerHTML = html;
        }

        function approveDeposit(id) {
            const d = state.pendingDeposits.find(p => p.id === id);
            if (d) {
                const user = state.users.find(u => u.id === d.userId);
                if (user) {
                    user.balance = (user.balance || 0) + d.amount;
                    if (user.id === state.userId) state.balance = user.balance;
                }
                state.pendingDeposits = state.pendingDeposits.filter(p => p.id !== id);
                saveDB();
                showToast('✅ ' + d.amount + ' TON onaylandı!', 'success');
                adminPending();
            }
        }

        function rejectDeposit(id) {
            state.pendingDeposits = state.pendingDeposits.filter(p => p.id !== id);
            saveDB();
            showToast('❌ Yatırım reddedildi.', 'error');
            adminPending();
        }

        function approveWithdraw(id) {
            const w = state.pendingWithdrawals.find(p => p.id === id);
            if (w) {
                state.pendingWithdrawals = state.pendingWithdrawals.filter(p => p.id !== id);
                saveDB();
                showToast('✅ ' + w.amount + ' TON çekim onaylandı!', 'success');
                adminPending();
            }
        }

        function rejectWithdraw(id) {
            const w = state.pendingWithdrawals.find(p => p.id === id);
            if (w) {
                const user = state.users.find(u => u.id === w.userId);
                if (user) {
                    user.balance = (user.balance || 0) + w.amount;
                    if (user.id === state.userId) state.balance = user.balance;
                }
                state.pendingWithdrawals = state.pendingWithdrawals.filter(p => p.id !== id);
                saveDB();
                showToast('❌ Çekim reddedildi, ' + w.amount + ' TON iade edildi.', 'error');
                adminPending();
            }
        }

        function adminStats() {
            const users = state.users;
            const preds = state.predictions;
            const totalBal = users.reduce((s, u) => s + (u.balance || 0), 0);
            const totalBets = state.bets.length;
            const active = preds.filter(p => p.status === 'active').length;
            const resolved = preds.filter(p => p.status !== 'active').length;
            const totalComm = preds.reduce((s, p) => s + (p.commission || 0), 0);
            const biggestWin = Math.max(...users.map(u => u.totalWon || 0), 0);
            const biggestLoss = Math.max(...users.map(u => u.totalLost || 0), 0);
            const today = new Date().toDateString();
            const newToday = users.filter(u => new Date(u.joined).toDateString() === today).length;

            openModal(
                '📊 ' + t('stats'),
                `
                    <div style="font-size:13px;line-height:1.8;">
                        ${t('totalUsers')}: <b>${users.length}</b><br>
                        ${t('newToday')}: <b>${newToday}</b><br>
                        ${t('totalBalance')}: <b>${totalBal.toFixed(2)} TON</b><br>
                        ${t('pendingDeposits')}: <b>${state.pendingDeposits.length}</b><br>
                        ${t('pendingWithdrawals')}: <b>${state.pendingWithdrawals.length}</b><br>
                        ${t('activePreds')}: <b>${active}</b><br>
                        ${t('resolvedPreds')}: <b>${resolved}</b><br>
                        ${t('totalBets')}: <b>${totalBets}</b><br>
                        ${t('totalCommission')}: <b>${totalComm.toFixed(2)} TON</b><br>
                        ${t('platformBalance')}: <b>${totalComm.toFixed(2)} TON</b><br>
                        ${t('biggestWin')}: <b>${biggestWin.toFixed(2)} TON</b><br>
                        ${t('biggestLoss')}: <b>${biggestLoss.toFixed(2)} TON</b>
                    </div>
                `,
                t('cancel'),
                () => {}
            );
            document.getElementById('modalConfirm').style.display = 'none';
        }

        // ==================== REPORT ====================
        function showReport() {
            const users = state.users;
            const preds = state.predictions;
            const totalBal = users.reduce((s, u) => s + (u.balance || 0), 0);
            const totalBets = state.bets.length;
            const active = preds.filter(p => p.status === 'active').length;
            const resolved = preds.filter(p => p.status !== 'active').length;
            const totalComm = preds.reduce((s, p) => s + (p.commission || 0), 0);
            const biggestWin = Math.max(...users.map(u => u.totalWon || 0), 0);
            const biggestLoss = Math.max(...users.map(u => u.totalLost || 0), 0);
            const today = new Date().toDateString();
            const newToday = users.filter(u => new Date(u.joined).toDateString() === today).length;
            const dailyDep = state.pendingDeposits.filter(d => new Date(d.time).toDateString() === today && d.status === 'approved').reduce((s, d) => s + d.amount, 0);
            const dailyWith = state.pendingWithdrawals.filter(w => new Date(w.time).toDateString() === today && w.status === 'approved').reduce((s, w) => s + w.amount, 0);
            const dailyVol = preds.filter(p => new Date(p.createdAt || Date.now()).toDateString() === today).reduce((s, p) => s + p.yes + p.no, 0);
            const dailyComm = preds.filter(p => new Date(p.resolvedAt || Date.now()).toDateString() === today).reduce((s, p) => s + (p.commission || 0), 0);

            openModal(
                '📊 ' + t('dailyReport'),
                `
                    <div class="report-box">
                        <div class="report-title">📊 ${t('dailyReport')}</div>
                        <div style="text-align:center;color:#8888aa;font-size:12px;margin-bottom:12px;">${new Date().toLocaleString()}</div>
                        
                        <div class="report-item">
                            <span class="report-label">${t('totalUsers')}</span>
                            <span class="report-value positive">${users.length}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('newToday')}</span>
                            <span class="report-value positive">${newToday}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('totalBalance')}</span>
                            <span class="report-value positive">${totalBal.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('dailyDeposit')}</span>
                            <span class="report-value positive">${dailyDep.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('dailyWithdraw')}</span>
                            <span class="report-value negative">${dailyWith.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('pendingDeposits')}</span>
                            <span class="report-value warning">${state.pendingDeposits.length}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('pendingWithdrawals')}</span>
                            <span class="report-value warning">${state.pendingWithdrawals.length}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('activePreds')}</span>
                            <span class="report-value positive">${active}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('resolvedPreds')}</span>
                            <span class="report-value">${resolved}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('totalBets')}</span>
                            <span class="report-value positive">${totalBets}</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('dailyVolume')}</span>
                            <span class="report-value positive">${dailyVol.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('dailyCommission')}</span>
                            <span class="report-value positive">${dailyComm.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('totalCommission')}</span>
                            <span class="report-value positive">${totalComm.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('platformBalance')}</span>
                            <span class="report-value positive">${totalComm.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('biggestWin')}</span>
                            <span class="report-value positive">${biggestWin.toFixed(2)} TON</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">${t('biggestLoss')}</span>
                            <span class="report-value negative">${biggestLoss.toFixed(2)} TON</span>
                        </div>
                    </div>
                `,
                t('cancel'),
                () => {}
            );
            document.getElementById('modalConfirm').style.display = 'none';
        }

        // ==================== SUPPORT ====================
        function renderSupport() {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div class="support-card">
                    <div style="font-size:48px;margin-bottom:12px;">🆘</div>
                    <div style="font-size:16px;font-weight:600;margin-bottom:4px;">${t('support')}</div>
                    <div style="color:#8888aa;font-size:13px;margin-bottom:8px;">${t('supportHours')}</div>
                    <div class="contact">${t('supportContact')}</div>
                    <div style="font-size:12px;color:#555577;margin-top:12px;">Hızlı yanıt için yazın.</div>
                </div>
            `;
        }

        // ==================== START ====================
        renderPage();

        // Otomatik rapor (24 saat)
        setInterval(() => {
            if (state.isLoggedIn) {
                showToast('📊 ' + t('dailyReport'), 'success');
            }
        }, 24 * 60 * 60 * 1000);

        // Verilerin kalıcı olduğunu gösteren mesaj
        console.log('✅ YESNO verileri kalıcı olarak kaydedildi (localStorage)');
        console.log('📊 Toplam kullanıcı:', state.users.length);
        console.log('📈 Toplam tahmin:', state.predictions.length);
        console.log('💰 Toplam bahis:', state.bets.length);
        console.log('🔥 Firebase bağlantısı aktif!');
    </script>
</body>
